# Deacon role-specific LoRA config
# Deacon: town-level watchdog, patrol cycles, health checks, wisp compaction

base_model: Qwen/Qwen3.5-2B
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

load_in_4bit: true
adapter: qlora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_linear: true

datasets:
  - path: output/datasets/deacon_train.jsonl
    type: chat_template
    chat_template: chatml
    field_messages: conversations
    message_field_role: from
    message_field_content: value

dataset_prepared_path: output/datasets/prepared_deacon
val_set_size: 0.05
output_dir: output/checkpoints/deacon-v1

sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true
gradient_checkpointing: true

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 3
learning_rate: 2e-4
lr_scheduler: cosine
warmup_steps: 50
optimizer: adamw_torch
weight_decay: 0.01
max_grad_norm: 1.0

bf16: auto
tf32: true
flash_attention: true

wandb_project: lora-forge
use_tensorboard: true
wandb_name: deacon-v1

saves_per_epoch: 2
eval_steps: 50
logging_steps: 10
